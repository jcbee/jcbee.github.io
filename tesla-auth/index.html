<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Authorization - SimpleAllureGPS</title>
    <style>
        body {
            background-color: #0F1015;
            color: #E2E8F0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #FFFFFF;
        }
        p {
            color: #94A3B8;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
        }
        .btn {
            display: block;
            width: 100%;
            background-color: #00B0FF;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            box-sizing: border-box;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #0091EA;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .fallback-container {
            margin-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }
        .fallback-text {
            font-size: 12px;
            color: #64748B;
            margin-bottom: 12px;
        }
        .code-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            color: #38BDF8;
            word-break: break-all;
            margin-bottom: 12px;
        }
        .copy-btn {
            background: transparent;
            color: #00B0FF;
            border: 1px solid #00B0FF;
            padding: 8px 16px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        .copy-btn:hover {
            background: rgba(0, 176, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <div style="width: 12px; height: 12px; background: #E82127; border-radius: 50%; margin: 0 auto 16px;"></div>
        <h1>Connection Success</h1>
        <p>Your Tesla account is authorized. Tap the button below to return to SimpleAllureGPS and complete the sync setup.</p>
        
        <a id="redirect-link" class="btn" href="#">Open SimpleAllureGPS</a>
        
        <div class="fallback-container">
            <div class="fallback-text">If the button doesn't open the app automatically, copy the code below and paste it in the app settings fallback.</div>
            <div id="code-display" class="code-box">Loading...</div>
            <button id="copy-btn" class="copy-btn">Copy Code</button>
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');

        if (code) {
            const appUrl = `simplealluregps://tesla-auth?code=${encodeURIComponent(code)}`;
            
            // Set the href of the main button
            document.getElementById('redirect-link').href = appUrl;
            document.getElementById('code-display').innerText = code;
            
            // Attempt auto-redirection
            setTimeout(() => {
                window.location.href = appUrl;
            }, 500);
        } else {
            document.getElementById('code-display').innerText = 'No authorization code found in URL.';
        }

        // Copy button handler
        document.getElementById('copy-btn').addEventListener('click', () => {
            if (code) {
                navigator.clipboard.writeText(code).then(() => {
                    const btn = document.getElementById('copy-btn');
                    btn.innerText = 'Copied!';
                    btn.style.color = '#00E676';
                    btn.style.borderColor = '#00E676';
                    setTimeout(() => {
                        btn.innerText = 'Copy Code';
                        btn.style.color = '#00B0FF';
                        btn.style.borderColor = '#00B0FF';
                    }, 2000);
                });
            }
        });
    </script>
</body>
</html>
